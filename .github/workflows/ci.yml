name: CI

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs: 
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'
    - run: yarn
    - run: yarn run test

    - name: Generate tag
      id: generate_tag
      run: |
        SHA=$(echo $GITHUB_SHA | head -c7)
        echo "sha=$SHA" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: us-east-2

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build docker image
      id: build-docker-image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        TAG: ${{ steps.generate_tag.outputs.sha }}
      run: |
        docker build -t $REGISTRY/ecr-ci-api:$TAG .
        docker push $REGISTRY/ecr-ci-api:$TAG
        IMAGE=$(echo $REGISTRY/ecr-ci-api:$TAG)
        echo "image=$IMAGE" >> $GITHUB_OUTPUT

    - name: Verify App Runner access role secret
      run: |
        if [ -z "${{ secrets.AWS_APP_RUNNER_ACCESS_ROLE_ARN }}" ]; then
          echo "::error::Secret AWS_APP_RUNNER_ACCESS_ROLE_ARN is not set. Add it in repo Settings > Secrets."
          exit 1
        fi

    - name: Deploy to App Runner
      uses: awslabs/amazon-app-runner-deploy@main
      with:
        service: ecr-ci-api
        image: ${{ steps.build-docker-image.outputs.image }}
        access-role-arn: ${{ secrets.AWS_APP_RUNNER_ACCESS_ROLE_ARN }}
        region: us-east-2
        cpu: 1
        memory: 2
        port: 3000

    # - name: Push docker image
    #   run: docker push 4592828/ci-api:${{ steps.generate_tag.outputs.sha }}